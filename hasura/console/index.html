<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banyan — Hasura GraphiQL</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/graphiql@3/graphiql.min.css"
    />
    <style>
      body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
      }
      #graphiql {
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="graphiql"></div>

    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/graphiql@3/graphiql.min.js"
    ></script>

    <script>
      const ENGINE_URL = "{{ENGINE_URL}}";
      const ADMIN_TOKEN = "{{ADMIN_TOKEN}}";

      const authHeaders = ADMIN_TOKEN
        ? {
            Authorization: "Bearer " + ADMIN_TOKEN,
            "x-hasura-role": "admin",
          }
        : {};

      // Use raw fetch to guarantee auth header is always sent,
      // regardless of GraphiQL's cached localStorage state.
      function fetcher(graphQLParams) {
        return fetch(ENGINE_URL + "/graphql", {
          method: "POST",
          headers: Object.assign(
            { "Content-Type": "application/json" },
            authHeaders,
          ),
          body: JSON.stringify(graphQLParams),
        }).then(function (r) {
          return r.json();
        });
      }

      const root = ReactDOM.createRoot(document.getElementById("graphiql"));
      root.render(
        React.createElement(GraphiQL, {
          fetcher: fetcher,
          defaultHeaders: JSON.stringify(authHeaders, null, 2),
        }),
      );
    </script>
  </body>
</html>
