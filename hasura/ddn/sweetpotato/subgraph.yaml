kind: Subgraph
version: v2
definition:
  name: sweetpotato
  generator:
    rootPath: .
    namingConvention: graphql
  includePaths:
    - metadata
  envMapping:
    SWEETPOTATO_SWEETPOTATO_PG_AUTHORIZATION_HEADER:
      fromEnv: SWEETPOTATO_SWEETPOTATO_PG_AUTHORIZATION_HEADER
    SWEETPOTATO_SWEETPOTATO_PG_READ_URL:
      fromEnv: SWEETPOTATO_SWEETPOTATO_PG_READ_URL
    SWEETPOTATO_SWEETPOTATO_PG_WRITE_URL:
      fromEnv: SWEETPOTATO_SWEETPOTATO_PG_WRITE_URL
  connectors:
    - path: connector/sweetpotato_pg/connector.yaml
      connectorLinkName: sweetpotato_pg
