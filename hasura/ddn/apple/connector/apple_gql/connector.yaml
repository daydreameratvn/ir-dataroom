kind: Connector
version: v2
definition:
  name: apple_gql
  subgraph: apple
  source: hasura/graphql:v0.2.3
  context: .
  envMapping:
    GRAPHQL_ENDPOINT:
      fromEnv: APPLE_APPLE_GQL_GRAPHQL_ENDPOINT_1
    GRAPHQL_ADMIN_SECRET:
      fromEnv: APPLE_APPLE_GQL_ADMIN_SECRET
    HASURA_CONNECTOR_PORT:
      fromEnv: APPLE_APPLE_GQL_HASURA_CONNECTOR_PORT_1
    HASURA_SERVICE_TOKEN_SECRET:
      fromEnv: APPLE_APPLE_GQL_HASURA_SERVICE_TOKEN_SECRET_1
    OTEL_EXPORTER_OTLP_ENDPOINT:
      fromEnv: APPLE_APPLE_GQL_OTEL_EXPORTER_OTLP_ENDPOINT_1
    OTEL_SERVICE_NAME:
      fromEnv: APPLE_APPLE_GQL_OTEL_SERVICE_NAME_1
