kind: Subgraph
version: v2
definition:
  name: apple
  generator:
    rootPath: .
    namingConvention: graphql
  includePaths:
    - metadata
  envMapping:
    APPLE_APPLE_GQL_AUTHORIZATION_HEADER:
      fromEnv: APPLE_APPLE_GQL_AUTHORIZATION_HEADER
    APPLE_APPLE_GQL_READ_URL:
      fromEnv: APPLE_APPLE_GQL_READ_URL
    APPLE_APPLE_GQL_WRITE_URL:
      fromEnv: APPLE_APPLE_GQL_WRITE_URL
  connectors:
    - path: connector/apple_gql/connector.yaml
      connectorLinkName: apple_gql
