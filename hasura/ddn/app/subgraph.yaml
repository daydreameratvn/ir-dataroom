kind: Subgraph
version: v2
definition:
  name: app
  generator:
    rootPath: .
    namingConvention: graphql
  includePaths:
    - metadata
  envMapping:
    APP_BANYAN_PG_AUTHORIZATION_HEADER:
      fromEnv: APP_BANYAN_PG_AUTHORIZATION_HEADER
    APP_BANYAN_PG_READ_URL:
      fromEnv: APP_BANYAN_PG_READ_URL
    APP_BANYAN_PG_WRITE_URL:
      fromEnv: APP_BANYAN_PG_WRITE_URL
    APP_PHOENIX_TS_AUTH_SERVICE_URL:
      fromEnv: APP_PHOENIX_TS_AUTH_SERVICE_URL
  connectors:
    - path: connector/banyan_pg/connector.yaml
      connectorLinkName: banyan_pg
    - path: connector/phoenix_ts/connector.yaml
      connectorLinkName: phoenix_ts
