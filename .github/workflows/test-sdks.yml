name: Test SDKs

on:
  pull_request:
    paths:
      - 'sdks/**'
  push:
    branches: [main]
    paths:
      - 'sdks/**'

concurrency:
  group: test-sdks-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  SLACK_CHANNEL_ID: C0AK8U09TEX

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: cd sdks && bun install
      - run: cd sdks && bun run typecheck
      - run: cd sdks && bun run test

      - name: Notify Slack (success)
        if: success() && github.ref == 'refs/heads/main'
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_NOTIFICATIONS_BOT_TOKEN }}
          payload: |
            channel: ${{ env.SLACK_CHANNEL_ID }}
            text: "✅ SDK tests passed\n${{ github.event.head_commit.url }}\n${{ github.event.head_commit.message }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view>"

      - name: Notify Slack (failure)
        if: failure()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_NOTIFICATIONS_BOT_TOKEN }}
          payload: |
            channel: ${{ env.SLACK_CHANNEL_ID }}
            text: "❌ SDK tests failed\n${{ github.event.pull_request.html_url || github.event.head_commit.url }}\n${{ github.event.head_commit.message }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view>"
