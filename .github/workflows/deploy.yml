name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  SLACK_CHANNEL_ID: C0AK8U09TEX

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      frontend: ${{ steps.filter.outputs.frontend }}
      investor-portal: ${{ steps.filter.outputs.investor-portal }}
      phoenix: ${{ steps.filter.outputs.phoenix }}
      forensics: ${{ steps.filter.outputs.forensics }}
      deploy-script: ${{ steps.filter.outputs.deploy-script }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'auth/**'
              - 'packages/**'
            frontend:
              - 'platform/apps/shell/**'
              - 'platform/libs/**'
              - 'platform/package.json'
            investor-portal:
              - 'platform/apps/investor-portal/**'
              - 'platform/libs/**'
              - 'platform/package.json'
            phoenix:
              - 'platform/apps/phoenix/**'
              - 'platform/libs/**'
              - 'platform/package.json'
            forensics:
              - 'agents/document-forensics/**'
            deploy-script:
              - 'scripts/deploy.sh'

  deploy-auth:
    name: Deploy Auth
    needs: detect-changes
    if: needs.detect-changes.outputs.auth == 'true' || needs.detect-changes.outputs.deploy-script == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Deploy auth
        run: bash scripts/deploy.sh auth

      - name: Post success to Slack
        if: success()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_NOTIFICATIONS_BOT_TOKEN }}
          payload: |
            channel: ${{ env.SLACK_CHANNEL_ID }}
            text: "[Banyan] ✅ Auth deployed\n${{ github.event.head_commit.url }}\n${{ github.event.head_commit.message }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view details>"

      - name: Post failure to Slack
        if: failure()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_NOTIFICATIONS_BOT_TOKEN }}
          payload: |
            channel: ${{ env.SLACK_CHANNEL_ID }}
            text: "[Banyan] ❌ Auth deploy failed\n${{ github.event.head_commit.url }}\n${{ github.event.head_commit.message }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view details>"

  deploy-frontend:
    name: Deploy Frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.deploy-script == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Deploy frontend
        run: bash scripts/deploy.sh frontend

      - name: Post success to Slack
        if: success()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_NOTIFICATIONS_BOT_TOKEN }}
          payload: |
            channel: ${{ env.SLACK_CHANNEL_ID }}
            text: "[Banyan] ✅ Frontend deployed\n${{ github.event.head_commit.url }}\n${{ github.event.head_commit.message }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view details>"

      - name: Post failure to Slack
        if: failure()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_NOTIFICATIONS_BOT_TOKEN }}
          payload: |
            channel: ${{ env.SLACK_CHANNEL_ID }}
            text: "[Banyan] ❌ Frontend deploy failed\n${{ github.event.head_commit.url }}\n${{ github.event.head_commit.message }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view details>"

  deploy-investor-portal:
    name: Deploy Investor Portal
    needs: detect-changes
    if: needs.detect-changes.outputs.investor-portal == 'true' || needs.detect-changes.outputs.deploy-script == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Deploy investor portal
        run: bash scripts/deploy.sh investor-portal

      - name: Post success to Slack
        if: success()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_NOTIFICATIONS_BOT_TOKEN }}
          payload: |
            channel: ${{ env.SLACK_CHANNEL_ID }}
            text: "[Banyan] ✅ Investor Portal deployed\n${{ github.event.head_commit.url }}\n${{ github.event.head_commit.message }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view details>"

      - name: Post failure to Slack
        if: failure()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_NOTIFICATIONS_BOT_TOKEN }}
          payload: |
            channel: ${{ env.SLACK_CHANNEL_ID }}
            text: "[Banyan] ❌ Investor Portal deploy failed\n${{ github.event.head_commit.url }}\n${{ github.event.head_commit.message }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view details>"

  deploy-phoenix:
    name: Deploy Phoenix
    needs: detect-changes
    if: needs.detect-changes.outputs.phoenix == 'true' || needs.detect-changes.outputs.deploy-script == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Deploy phoenix
        run: bash scripts/deploy.sh phoenix

      - name: Post success to Slack
        if: success()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_NOTIFICATIONS_BOT_TOKEN }}
          payload: |
            channel: ${{ env.SLACK_CHANNEL_ID }}
            text: "[Banyan] ✅ Phoenix deployed\n${{ github.event.head_commit.url }}\n${{ github.event.head_commit.message }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view details>"

      - name: Post failure to Slack
        if: failure()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_NOTIFICATIONS_BOT_TOKEN }}
          payload: |
            channel: ${{ env.SLACK_CHANNEL_ID }}
            text: "[Banyan] ❌ Phoenix deploy failed\n${{ github.event.head_commit.url }}\n${{ github.event.head_commit.message }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view details>"

  deploy-forensics:
    name: Deploy Forensics
    needs: detect-changes
    if: needs.detect-changes.outputs.forensics == 'true' || needs.detect-changes.outputs.deploy-script == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Deploy forensics
        run: bash scripts/deploy.sh forensics

      - name: Post success to Slack
        if: success()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_NOTIFICATIONS_BOT_TOKEN }}
          payload: |
            channel: ${{ env.SLACK_CHANNEL_ID }}
            text: "[Banyan] ✅ Forensics deployed\n${{ github.event.head_commit.url }}\n${{ github.event.head_commit.message }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view details>"

      - name: Post failure to Slack
        if: failure()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_NOTIFICATIONS_BOT_TOKEN }}
          payload: |
            channel: ${{ env.SLACK_CHANNEL_ID }}
            text: "[Banyan] ❌ Forensics deploy failed\n${{ github.event.head_commit.url }}\n${{ github.event.head_commit.message }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view details>"

  deploy-forensics-gpu:
    name: Deploy Forensics GPU
    needs: detect-changes
    if: needs.detect-changes.outputs.forensics == 'true' || needs.detect-changes.outputs.deploy-script == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Deploy forensics GPU
        run: bash scripts/deploy.sh forensics-gpu

      - name: Post success to Slack
        if: success()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_NOTIFICATIONS_BOT_TOKEN }}
          payload: |
            channel: ${{ env.SLACK_CHANNEL_ID }}
            text: "[Banyan] ✅ Forensics GPU deployed\n${{ github.event.head_commit.url }}\n${{ github.event.head_commit.message }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view details>"

      - name: Post failure to Slack
        if: failure()
        uses: slackapi/slack-github-action@v2.1.1
