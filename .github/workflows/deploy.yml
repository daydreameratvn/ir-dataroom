name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      frontend: ${{ steps.filter.outputs.frontend }}
      investor-portal: ${{ steps.filter.outputs.investor-portal }}
      phoenix: ${{ steps.filter.outputs.phoenix }}
      forensics: ${{ steps.filter.outputs.forensics }}
      deploy-script: ${{ steps.filter.outputs.deploy-script }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'auth/**'
              - 'packages/**'
            frontend:
              - 'platform/apps/shell/**'
              - 'platform/libs/**'
              - 'platform/package.json'
            investor-portal:
              - 'platform/apps/investor-portal/**'
              - 'platform/libs/**'
              - 'platform/package.json'
            phoenix:
              - 'platform/apps/phoenix/**'
              - 'platform/libs/**'
              - 'platform/package.json'
            forensics:
              - 'agents/document-forensics/**'
            deploy-script:
              - 'scripts/deploy.sh'

  deploy-auth:
    name: Deploy Auth
    needs: detect-changes
    if: needs.detect-changes.outputs.auth == 'true' || needs.detect-changes.outputs.deploy-script == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Deploy auth
        run: bash scripts/deploy.sh auth

  deploy-frontend:
    name: Deploy Frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.deploy-script == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Deploy frontend
        run: bash scripts/deploy.sh frontend

  deploy-investor-portal:
    name: Deploy Investor Portal
    needs: detect-changes
    if: needs.detect-changes.outputs.investor-portal == 'true' || needs.detect-changes.outputs.deploy-script == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Deploy investor portal
        run: bash scripts/deploy.sh investor-portal

  deploy-phoenix:
    name: Deploy Phoenix
    needs: detect-changes
    if: needs.detect-changes.outputs.phoenix == 'true' || needs.detect-changes.outputs.deploy-script == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Deploy phoenix
        run: bash scripts/deploy.sh phoenix

  deploy-forensics:
    name: Deploy Forensics
    needs: detect-changes
    if: needs.detect-changes.outputs.forensics == 'true' || needs.detect-changes.outputs.deploy-script == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Deploy forensics
        run: bash scripts/deploy.sh forensics

  deploy-forensics-gpu:
    name: Deploy Forensics GPU
    needs: detect-changes
    if: needs.detect-changes.outputs.forensics == 'true' || needs.detect-changes.outputs.deploy-script == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Deploy forensics GPU
        run: bash scripts/deploy.sh forensics-gpu
