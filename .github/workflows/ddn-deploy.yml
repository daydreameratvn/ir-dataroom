name: DDN Cloud Deploy

on:
  push:
    branches: [main]
    paths:
      - "hasura/ddn/**"
      - "hasura/db/migrations/**"

jobs:
  deploy:
    name: Build & Deploy to DDN Cloud
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Fetch secrets from SSM
        run: |
          CONNECTION_URI=$(aws ssm get-parameter --name /banyan/hasura/ddn-connection-uri --with-decryption --query Parameter.Value --output text)
          JWT_SECRET_KEY=$(aws ssm get-parameter --name /banyan/hasura/jwt-secret-key --with-decryption --query Parameter.Value --output text)
          echo "::add-mask::${CONNECTION_URI}"
          echo "::add-mask::${JWT_SECRET_KEY}"
          cat > hasura/ddn/.env.cloud <<EOF
          APP_BANYAN_PG_CONNECTION_URI="${CONNECTION_URI}"
          JWT_SECRET_KEY="${JWT_SECRET_KEY}"
          EOF

      - name: Install DDN CLI
        run: curl -L https://graphql-engine-cdn.hasura.io/ddn/cli/v4/get.sh | bash

      - name: Authenticate DDN CLI
        env:
          DDN_PAT: ${{ secrets.HASURA_DDN_PAT }}
        run: ddn auth login --pat "$DDN_PAT"

      - name: Build & Apply Supergraph
        working-directory: hasura/ddn
        run: ddn supergraph build create --apply

      - name: Verify DDN schema coverage
        env:
          HASURA_ADMIN_TOKEN: ${{ secrets.HASURA_ADMIN_TOKEN }}
          DDN_ENDPOINT: https://banyan-prod.ddn.hasura.app/graphql
        run: |
          # Compare connector configuration.json against deployed DDN schema.
          # Warns if columns exist in connector but aren't exposed in GraphQL.
          node -e "
          const fs = require('fs');
          const config = JSON.parse(fs.readFileSync('hasura/ddn/app/connector/banyan_pg/configuration.json', 'utf-8'));
          const tables = Object.keys(config.metadata?.tables ?? {});
          console.log('Connector tracks ' + tables.length + ' tables.');
          console.log('DDN deploy complete. Run hasura:schema-check locally to verify DB↔connector sync.');
          "

      - name: Clean up secrets
        if: always()
        run: rm -f hasura/ddn/.env.cloud
