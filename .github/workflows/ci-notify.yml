name: CI Notifications

on:
  workflow_run:
    workflows: [Test, Deploy]
    types: [completed]

env:
  SLACK_CHANNEL_ID: C0AK8U09TEX

jobs:
  notify-failure:
    name: Slack Failure Notification
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Prepare Slack failure message
        id: slack_fail
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          ACTOR: ${{ github.event.workflow_run.actor.login }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          FAILED=$(gh api repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs \
            --jq '[.jobs[] | select(.conclusion == "failure") | .name] | join(", ")') || FAILED="unknown"
          TEXT=$(jq -n \
            --arg wf "$WORKFLOW_NAME" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg url "$RUN_URL" \
            --arg sha "${COMMIT_SHA:0:7}" \
            --arg failed "$FAILED" \
            '"[Banyan] ❌ " + $wf + " failed on `" + $branch + "`\nFailed: " + $failed + "\nBy: " + $actor + " (" + $sha + ")\n<" + $url + "|view details>"')
          echo "text=$TEXT" >> $GITHUB_OUTPUT

      - name: Post failure to Slack
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_NOTIFICATIONS_BOT_TOKEN }}
          payload: |
            channel: ${{ env.SLACK_CHANNEL_ID }}
            text: ${{ steps.slack_fail.outputs.text }}
