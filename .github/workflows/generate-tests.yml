name: Generate Tests

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "platform/**/*.ts"
      - "platform/**/*.tsx"
      - "sdks/**/*.ts"
      - "sdks/**/*.tsx"
      - "agents/**/*.ts"
      - "!**/*.test.ts"
      - "!**/*.test.tsx"
      - "!**/*.spec.ts"
      - "!**/*.spec.tsx"
      - "!**/test/**"

concurrency:
  group: generate-tests-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  generate-tests:
    name: Generate Tests with Claude Code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Detect changed areas
        id: changes
        run: |
          changed=$(git diff origin/${{ github.base_ref }}...HEAD --name-only --diff-filter=ACMR | grep -E '\.(ts|tsx)$' | grep -v '\.test\.' | grep -v '\.spec\.' | grep -v '/test/' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$changed" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          areas=""
          echo "$changed" | grep -q '^platform/' && areas="${areas}platform "
          echo "$changed" | grep -q '^sdks/' && areas="${areas}sdks "
          echo "$changed" | grep -q '^agents/' && areas="${areas}agents "
          echo "areas=${areas}" >> "$GITHUB_OUTPUT"

      - name: Skip if no source changes
        if: steps.changes.outputs.files == ''
        run: echo "No source file changes detected, skipping test generation."

      - name: Configure AWS Credentials
        if: steps.changes.outputs.files != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Generate tests
        if: steps.changes.outputs.files != ''
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: "true"
          allowed_bots: "*"
          claude_args: >-
            --model apac.anthropic.claude-sonnet-4-20250514-v1:0
            --max-turns 50
            --allowedTools "Bash(git diff:*)" "Bash(git add:*)" "Bash(git commit:*)" "Bash(git push:*)" "Bash(git status:*)" "Bash(git log:*)" "Bash(bun:*)" "Bash(bunx:*)" "Bash(cd:*)" "Bash(ls:*)" "Read" "Write" "Edit" "Glob" "Grep"

          prompt: |
            You are a senior test engineer for the Banyan monorepo. Your job is to write
            high-quality tests for the files changed in this PR, then commit them to this branch.

            ## Changed areas: ${{ steps.changes.outputs.areas }}

            ## Changed files:
            ${{ steps.changes.outputs.files }}

            ## Instructions

            1. Read each changed file to understand what it does.
            2. Check if a test file already exists alongside it (e.g. `Foo.test.tsx` next to `Foo.tsx`).
               - If tests exist, read them and add NEW test cases for the new/changed code only.
               - If no tests exist, create a new test file.
            3. For each file, determine which test types are needed:

               **Unit tests** — Always. Test individual functions, components, hooks in isolation.
               Mock external dependencies. Every public export needs coverage.

               **Integration tests** — When a file interacts with other modules (API calls,
               context providers, store actions). Test the integration points with realistic mocks.

               **Regression tests** — If the PR title or description mentions a bug fix, write a
               test that reproduces the original bug and verifies the fix.

               **E2E tests** — Only for new user-facing pages or critical flows. Use Playwright
               test format. Place in a `__e2e__/` directory next to the feature.

            4. Follow these conventions strictly:

               **Platform (React):**
               - Framework: Vitest + React Testing Library
               - File naming: `ComponentName.test.tsx` next to `ComponentName.tsx`
               - Import test utilities from `@testing-library/react`
               - Use the test wrapper from `apps/shell/src/test/wrapper.tsx` for components
                 that need Router/Auth/Tenant context
               - Use `vi.mock()` for module mocking, `vi.spyOn()` for instance spies
               - Use `userEvent.setup()` for user interactions, `fireEvent` for low-level events
               - Use `waitFor()` for async assertions
               - Vitest globals are enabled — no need to import `describe`, `it`, `expect`
               - Strict TypeScript — use `!` for array indexing, no `any` types

               **SDKs (Node/React):**
               - Framework: Vitest
               - Test every public method with success and error paths
               - Mock `fetch` globally for HTTP client tests
               - React SDK hooks: use `renderHook()` with appropriate wrapper

               **Agents:**
               - Framework: Vitest
               - Mock LLM calls — never call real models in tests
               - Test tool functions with known inputs/outputs
               - Test agent decision logic with mocked tool results

            5. After writing tests, verify they work:
               ```bash
               # For platform changes
               cd platform && bun run test

               # For SDK changes
               cd sdks && bun run test

               # For agent changes (if test script exists)
               cd agents && bun run test 2>/dev/null || bunx vitest run
               ```

            6. Fix any failing tests. Tests MUST pass before committing.

            7. Stage ONLY the test files and commit:
               ```
               git add <test-files-only>
               git commit -m "test(<scope>): add tests for PR changes

               Generated by Claude Code in CI.

               Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
               ```

            8. Push the commit to this branch:
               ```
               git push
               ```

            ## Rules
            - NEVER modify source files — only create/edit test files
            - NEVER commit if tests are failing
            - If a file is too complex to test reliably, skip it and leave a comment in the PR
            - Keep tests focused and readable — prefer many small tests over few large ones
            - Test behavior, not implementation details
            - Use descriptive test names: `it('should return 404 when claim does not exist')`
